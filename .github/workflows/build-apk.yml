name: Build SWRLZ-CORE 0.1.5 APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Configure SDK and build
        shell: bash
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > android/local.properties
          chmod +x android/gradlew
          cd android
          ./gradlew --no-daemon --stacktrace clean assembleDebug
      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/SWRLZ_CORE_0.1.5-context-control-debug.apk
          sha256sum dist/SWRLZ_CORE_0.1.5-context-control-debug.apk > dist/SWRLZ_CORE_0.1.5-context-control-debug.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: SWRLZ_CORE_0.1.5_ANDROID_DOWNLOADS
          path: dist/
          retention-days: 30
